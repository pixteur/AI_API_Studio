<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI API Studio 1.3 - Login</title>
<script>(function(){if(localStorage.getItem('nb-theme')==='light')document.documentElement.setAttribute('data-theme','light');}());</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --lg-bg: #0d0d0d; --lg-card: #161616; --lg-border: #2a2a2a;
    --lg-text: #e0e0e0; --lg-dim: #666; --lg-input: #1f1f1f;
    --lg-iborder: #2f2f2f; --lg-accent: #c8ff00; --lg-acc-fg: #0d0d0d;
  }
  [data-theme="light"] {
    --lg-bg: #fafafa; --lg-card: #ffffff; --lg-border: #e2e2e2;
    --lg-text: #111111; --lg-dim: #888; --lg-input: #f2f2f2;
    --lg-iborder: #cccccc; --lg-accent: #ff5500; --lg-acc-fg: #ffffff;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--lg-bg);
    color: var(--lg-text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, color 0.2s;
  }
  .login-card {
    background: var(--lg-card);
    border: 1px solid var(--lg-border);
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.25);
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo-icon {
    font-size: 48px;
    display: block;
    margin-bottom: 12px;
  }
  .logo h1 {
    font-size: 22px;
    font-weight: 600;
    color: var(--lg-text);
    letter-spacing: -0.3px;
  }
  .logo p {
    font-size: 13px;
    color: var(--lg-dim);
    margin-top: 4px;
  }
  .form-group {
    margin-bottom: 16px;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--lg-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }
  input[type="text"], input[type="password"] {
    width: 100%;
    background: var(--lg-input);
    border: 1px solid var(--lg-iborder);
    border-radius: 8px;
    color: var(--lg-text);
    font-size: 15px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus, input[type="password"]:focus {
    border-color: var(--lg-accent);
  }
  .btn-login {
    width: 100%;
    background: var(--lg-accent);
    color: var(--lg-acc-fg);
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    padding: 13px;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-login:hover { opacity: 0.9; }
  .btn-login:active { transform: scale(0.99); }
  .error {
    background: rgba(255, 80, 80, 0.12);
    border: 1px solid rgba(255, 80, 80, 0.3);
    border-radius: 8px;
    color: #ff6b6b;
    font-size: 13px;
    padding: 10px 14px;
    margin-bottom: 16px;
  }
  .hint {
    text-align: center;
    font-size: 12px;
    color: var(--lg-dim);
    margin-top: 20px;
  }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <span class="logo-icon">🍌</span>
    <h1>AI API Studio</h1>
    <p style="font-size:11px; color:var(--lg-dim); margin-top:6px; text-transform:uppercase; letter-spacing:0.6px; font-weight:600;">1.4</p>
    <p>AI Image Generator</p>
  </div>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" autocomplete="username" autofocus required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login">Sign in</button>
  </form>

  <p class="hint">Local access - private network only</p>
</div>
</body>
</html>
